<!doctype html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain2 trešās puses tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container narrow">
        <h1>Domain2 iframe testa lapa</h1>
        <p class="subtitle">
            Šī lapa ir paredzēta, lai tiktu iegulta kā trešās puses resurss Domain1 lapā
        </p>

        <section class="card">
            <h2>Scenārijs</h2>
            <div id="modeInfo" class="result-box">Nosaka scenāriju...</div>
        </section>

        <section class="card">
            <h2>Sīkdatņu testa rezultāti</h2>
            <div id="result" class="result-box">Tiek veikts tests...</div>
        </section>

        <section class="card">
            <h2>Darbības</h2>
            <div class="button-group">
                <button id="setCookieBtn">Palaist testu vēlreiz</button>
                <button id="sendMessageBtn" class="secondary">Nosūtīt rezultātu vecākam</button>
            </div>
        </section>

        <section class="card">
            <h2>Šī brīža document.cookie</h2>
            <div id="cookieValue" class="result-box">(pārbauda...)</div>
        </section>
    </main>

    <script>
        const resultBox = document.getElementById("result");
        const cookieValue = document.getElementById("cookieValue");
        const modeInfo = document.getElementById("modeInfo");
        const setCookieBtn = document.getElementById("setCookieBtn");
        const sendMessageBtn = document.getElementById("sendMessageBtn");

        const mode = new URLSearchParams(window.location.search).get("mode") || "js";
        let lastPayload = {
            source: "domain2-iframe",
            mode,
            status: "not-run",
            cookie: "",
            receivedCookieHeader: null,
            parsedCookieValue: null,
            hasStorageAccess: undefined,
            requestStorageAccessSupported: undefined,
            requestStorageAccessResult: null
        };

        const modeTextMap = {
            server: "Aktīvais scenārijs: trešās puses Set-Cookie",
            js: "Aktīvais scenārijs: trešās puses document.cookie",
            chips: "Aktīvais scenārijs: trešās puses CHIPS / Partitioned Cookies",
            "storage-access": "Aktīvais scenārijs: Storage Access API"
        };

        modeInfo.textContent = modeTextMap[mode] || `Aktīvais scenārijs: ${mode}`;
        if (mode === "storage-access") {
            setCookieBtn.textContent = "Pieprasīt Storage Access";
        }

        function refreshCookieDisplay() {
            cookieValue.textContent = document.cookie || "(empty)";
        }

        async function runJsCookieScenario() {
            const value = "tp_cookie_" + Date.now();

            try {
                document.cookie = `tp_iframe_cookie=${value}; path=/; SameSite=None; Secure`;
                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "js",
                    status: "Mēģināts ierakstīt trešās puses sīkdatni ar document.cookie",
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: null,
                    parsedCookieValue: null
                };

                resultBox.textContent =
                    "Mēģināts ierakstīt trešās puses sīkdatni ar document.cookie." +
                    `Mēģinātā vērtība: tp_iframe_cookie=${value}` +
                    `Šī brīža document.cookie: ${document.cookie || "(empty)"}`;
            } catch (error) {
                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "js",
                    status: `Neizdevās ierakstīt sīkdatni: ${error.message}`,
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: null,
                    parsedCookieValue: null
                };

                resultBox.textContent =
                    "Neizdevās ierakstīt trešās puses sīkdatni ar document.cookie." +
                    `Iemesls: ${error.message}`;
            }

            refreshCookieDisplay();
        }

        async function runServerCookieScenario() {
            const testId = "tp_server_" + Date.now();

            try {
                const setResponse = await fetch(`/api/set-third-cookie?test_id=${encodeURIComponent(testId)}`, {
                    method: "GET",
                    credentials: "include"
                });
                const setData = await setResponse.json();

                const showResponse = await fetch("/api/show-third-cookie", {
                    method: "GET",
                    credentials: "include"
                });
                const showData = await showResponse.json();

                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "server",
                    status: "Trešās puses Set-Cookie scenārijs izpildīts",
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: showData.receivedCookieHeader || null,
                    parsedCookieValue: showData.parsedCookieValue || null
                };

                resultBox.textContent =
                    "Trešās puses Set-Cookie scenārijs izpildīts." +
                    `Set endpoint statuss: ${setResponse.status}` +
                    `Iestatītā vērtība: ${setData.cookieValue || "(nav)"}` +
                    `Show endpoint statuss: ${showResponse.status}` +
                    `Serveris saņēma Cookie galveni: ${showData.receivedCookieHeader || "(nav)"}` +
                    `Serveris redz tp_cookie_server: ${showData.parsedCookieValue || "(nav)"}`;
            } catch (error) {
                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "server",
                    status: `Trešās puses Set-Cookie scenārijs neizdevās: ${error.message}`,
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: null,
                    parsedCookieValue: null
                };

                resultBox.textContent =
                    "Trešās puses Set-Cookie scenārijs neizdevās." +
                    `Iemesls: ${error.message}`;
            }

            refreshCookieDisplay();
        }

        async function runChipsScenario() {
            const testId = "chips_" + Date.now();

            try {
                const setResponse = await fetch(`/api/set-third-cookie-chips?test_id=${encodeURIComponent(testId)}`, {
                    method: "GET",
                    credentials: "include"
                });
                const setData = await setResponse.json();

                const showResponse = await fetch("/api/show-third-cookie-chips", {
                    method: "GET",
                    credentials: "include"
                });
                const showData = await showResponse.json();

                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "chips",
                    status: "Trešās puses CHIPS scenārijs izpildīts",
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: showData.receivedCookieHeader || null,
                    parsedCookieValue: showData.parsedCookieValue || null
                };

                resultBox.textContent =
                    "Trešās puses CHIPS scenārijs izpildīts." +
                    `Set endpoint statuss: ${setResponse.status}` +
                    `Iestatītā vērtība: ${setData.cookieValue || "(nav)"}` +
                    `Show endpoint statuss: ${showResponse.status}` +
                    `Serveris saņēma Cookie galveni: ${showData.receivedCookieHeader || "(nav)"}` +
                    `Serveris redz tp_cookie_partitioned: ${showData.parsedCookieValue || "(nav)"}`;
            } catch (error) {
                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "chips",
                    status: `Trešās puses CHIPS scenārijs neizdevās: ${error.message}`,
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: null,
                    parsedCookieValue: null
                };

                resultBox.textContent =
                    "Trešās puses CHIPS scenārijs neizdevās." +
                    `Iemesls: ${error.message}`;
            }

            refreshCookieDisplay();
        }

        async function runStorageAccessScenario() {
            const supportsHasStorageAccess = typeof document.hasStorageAccess === "function";
            const supportsRequestStorageAccess = typeof document.requestStorageAccess === "function";

            let hasAccessBefore = "nav atbalsta";
            let requestResult = "nav izsaukts";
            let showData = null;

            try {
                if (supportsHasStorageAccess) {
                    hasAccessBefore = await document.hasStorageAccess();
                }

                if (supportsRequestStorageAccess) {
                    await document.requestStorageAccess();
                    requestResult = "piešķirta vai pieprasījums izpildīts veiksmīgi";
                } else {
                    requestResult = "nav atbalsta";
                }

                const showResponse = await fetch("/api/show-storage-access-cookie", {
                    method: "GET",
                    credentials: "include"
                });
                showData = await showResponse.json();

                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "storage-access",
                    status: "Storage Access API scenārijs izpildīts",
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: showData.receivedCookieHeader || null,
                    parsedCookieValue: showData.parsedCookieValue || null,
                    hasStorageAccess: hasAccessBefore,
                    requestStorageAccessSupported: supportsRequestStorageAccess,
                    requestStorageAccessResult: requestResult
                };

                resultBox.textContent =
                    "Storage Access API scenārijs izpildīts." +
                    `document.hasStorageAccess atbalsts: ${supportsHasStorageAccess}` +
                    `Piekļuve pirms pieprasījuma: ${hasAccessBefore}` +
                    `requestStorageAccess atbalsts: ${supportsRequestStorageAccess}` +
                    `requestStorageAccess rezultāts: ${requestResult}` +
                    `Serveris saņēma Cookie galveni: ${showData?.receivedCookieHeader || "(nav)"}` +
                    `Serveris redz saa_cookie: ${showData?.parsedCookieValue || "(nav)"}`;
            } catch (error) {
                lastPayload = {
                    ...lastPayload,
                    source: "domain2-iframe",
                    mode: "storage-access",
                    status: `Storage Access API scenārijs neizdevās: ${error.message}`,
                    cookie: document.cookie || "(empty)",
                    receivedCookieHeader: showData?.receivedCookieHeader || null,
                    parsedCookieValue: showData?.parsedCookieValue || null,
                    hasStorageAccess: hasAccessBefore,
                    requestStorageAccessSupported: supportsRequestStorageAccess,
                    requestStorageAccessResult: error.message
                };

                resultBox.textContent =
                    "Storage Access API scenārijs neizdevās." +
                    `document.hasStorageAccess atbalsts: ${supportsHasStorageAccess}` +
                    `Piekļuve pirms pieprasījuma: ${hasAccessBefore}` +
                    `requestStorageAccess atbalsts: ${supportsRequestStorageAccess}` +
                    `Iemesls: ${error.message}`;
            }

            refreshCookieDisplay();
        }

        function sendMessageToParent() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(lastPayload, "*");
            }
        }

        async function runScenario(autoSend = true) {
            if (mode === "server") {
                await runServerCookieScenario();
            } else if (mode === "chips") {
                await runChipsScenario();
            } else if (mode === "storage-access") {
                await runStorageAccessScenario();
            } else {
                await runJsCookieScenario();
            }

            if (autoSend) {
                sendMessageToParent();
            }
        }

        setCookieBtn.addEventListener("click", () => runScenario(true));
        sendMessageBtn.addEventListener("click", sendMessageToParent);

        runScenario(mode !== "storage-access");
    </script>
</body>
</html>
